spring.application.name=QuanLyLuong
server.port=8080
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Default profile uses H2 so the project can run immediately after cloning.
spring.datasource.url=jdbc:h2:mem:quanlyluong;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.thymeleaf.cache=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed.enabled=true
