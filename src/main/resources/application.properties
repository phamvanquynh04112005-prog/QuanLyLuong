spring.application.name=QuanLyLuong
server.port=8080
server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Default profile uses file-based H2 so data persists after stopping the app.
spring.datasource.url=jdbc:h2:file:./data/quanlyluong;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.thymeleaf.cache=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.seed.enabled=true
app.db-json.auto-export.enabled=true
app.db-json.export.path=data/quanlyluong-export.json

# SMTP config (uu tien bien moi truong, fallback gia tri trong file)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:nguyenduykhang.k15@stu.upt.edu.vn}
spring.mail.password=${MAIL_PASSWORD:myosfephotbibdwb}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
