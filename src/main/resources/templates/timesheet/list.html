<div th:fragment="content">
    <section class="panel">
        <div class="panel-header timesheet-header">
            <div>
                <p class="panel-kicker">Theo doi cong lam viec</p>
                <h3 th:text="${periodTitle}"></h3>
            </div>
            <div class="timesheet-filter-block">
                <div class="period-switch timesheet-period-switch">
                    <a class="btn btn-sm" th:classappend="${periodType == 'month'} ? ' btn-primary' : ' btn-outline'"
                       th:href="@{/timesheets(month=${month},year=${year},periodType='month')}">Tháng</a>
                    <a class="btn btn-sm" th:classappend="${periodType == 'quarter'} ? ' btn-primary' : ' btn-outline'"
                       th:href="@{/timesheets(month=${month},year=${year},periodType='quarter')}">Quý</a>
                    <a class="btn btn-sm" th:classappend="${periodType == 'year'} ? ' btn-primary' : ' btn-outline'"
                       th:href="@{/timesheets(month=${month},year=${year},periodType='year')}">Năm</a>
                </div>
                <div class="actions-row">
                    <form class="timesheet-month-filter" method="get" th:action="@{/timesheets}">
                        <input type="hidden" name="periodType" th:value="${periodType}">
                        <input class="input" type="number" min="1" max="12" name="month" th:value="${month}" aria-label="Thang">
                        <input class="input" type="number" min="2020" max="2099" name="year" th:value="${year}" aria-label="Nam">
                        <button class="btn btn-outline" type="submit">Xem tháng</button>
                    </form>
                    <a class="btn btn-outline" th:href="@{/timesheets/new(month=${month},year=${year})}">Nhập thủ công</a>
                    <button class="btn btn-secondary" id="toggleTimesheetImportBtn" type="button">Import bảng công Excel</button>
                    <a class="btn btn-outline" th:href="@{/export/excel/timesheet(month=${month},year=${year})}">Export bảng công Excel</a>
                </div>
            </div>
        </div>

        <div id="timesheetImportPanel" class="detail-grid" style="display:none;">
            <div class="summary-box wide-card timesheet-import-card">
                <div class="panel-header compact timesheet-import-header">
                    <div>
                        <p class="panel-kicker">Import Excel / Máy chấm công</p>
                        <h3>Upload file log theo ngày và giờ</h3>
                    </div>
                </div>
                <form class="stack-form" th:action="@{/timesheets/import}" method="post" enctype="multipart/form-data">
                    <input type="hidden" name="periodType" th:value="${periodType}">
                    <div class="timesheet-import-grid">
                        <div>
                            <label class="field-label">Thang</label>
                            <input class="input" type="number" name="month" min="1" max="12" th:value="${month}" required>
                        </div>
                        <div>
                            <label class="field-label">Nam</label>
                            <input class="input" type="number" name="year" min="2020" max="2099" th:value="${year}" required>
                        </div>
                        <div>
                            <label class="field-label">Nguon du lieu</label>
                            <select class="input" name="source">
                                <option value="EXCEL_IMPORT" selected>Import Excel</option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">File .xlsx</label>
                            <input class="input" type="file" name="file" accept=".xlsx,.xls" required>
                        </div>
                    </div>
                    <div class="actions-row timesheet-import-actions">
                        <button class="btn btn-primary" type="submit">Import file</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Mã NV</th>
                <th>Họ và tên</th>
                <th>Phòng ban</th>
                <th>Ngày công</th>
                <th>Nghỉ phép</th>
                <th>Giờ thường</th>
                <th>Giờ tăng ca</th>
                <th>Số log</th>
                <th>Ghi chú</th>
                <th>Thao tác</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="timesheet : ${timesheets}">
                <td th:text="${timesheet.employee.employeeCode != null ? timesheet.employee.employeeCode : 'Chua cap'}"></td>
                <td th:text="${timesheet.employee.fullName}"></td>
                <td th:text="${timesheet.employee.department != null ? timesheet.employee.department.name : 'Chua co phong'}"></td>
                <td th:text="${timesheet.workDays}"></td>
                <td th:text="${timesheet.leaveDays}"></td>
                <td th:text="|${timesheet.regularHours}h|"></td>
                <td th:text="|${timesheet.overtimeWeekdayHours + timesheet.overtimeWeekendHours + timesheet.overtimeHolidayHours}h|"></td>
                <td th:text="${timesheet.importedLogCount}"></td>
                <td th:text="${timesheet.note != null and !timesheet.note.isBlank() ? timesheet.note : 'Khong co'}"></td>
                <td class="timesheet-action-cell">
                    <div class="timesheet-action-wrap">
                        <a class="btn btn-secondary btn-sm"
                           th:href="@{/timesheets/{id}/details(id=${timesheet.id},month=${month},year=${year})}">Chi tiet</a>
                        <form th:action="@{/timesheets/{id}/delete(id=${timesheet.id})}" method="post">
                            <input type="hidden" name="month" th:value="${month}">
                            <input type="hidden" name="year" th:value="${year}">
                            <input type="hidden" name="periodType" th:value="${periodType}">
                            <button class="btn btn-danger btn-sm" type="submit">Xoa</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(timesheets)}">
                <td colspan="10" class="empty-cell">Chua co du lieu cham cong cho bo loc hien tai.</td>
            </tr>
            </tbody>
        </table>
    </section>

    <script>
        (function () {
            const button = document.getElementById('toggleTimesheetImportBtn');
            const panel = document.getElementById('timesheetImportPanel');
            if (!button || !panel) {
                return;
            }
            button.addEventListener('click', function () {
                const isHidden = panel.style.display === 'none' || panel.style.display === '';
                panel.style.display = isHidden ? 'block' : 'none';
                button.textContent = isHidden ? 'Dong import' : 'Import bang cong Excel';
            });
        })();
    </script>
</div>
