<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Theo doi cong lam viec</p>
                <h3 th:text="|Cham cong thang ${month}/${year}|"></h3>
            </div>
        </div>

        <div class="toolbar">
            <form class="toolbar" method="get" th:action="@{/timesheets}">
                <input class="input" style="max-width: 120px" type="number" min="1" max="12" name="month" th:value="${month}">
                <input class="input" style="max-width: 120px" type="number" min="2020" max="2099" name="year" th:value="${year}">
                <button class="btn btn-outline" type="submit">Xem thang</button>
            </form>
            <button class="btn btn-secondary"
                    type="button"
                    id="toggleImportFormBtn"
                    aria-expanded="false"
                    aria-controls="importFormWrapper">
                Import bang cong Excel
            </button>
            <a class="btn btn-outline" th:href="@{/export/excel/timesheet(month=${month},year=${year})}">Export bang cong Excel</a>
        </div>

        <div class="detail-grid" id="importFormWrapper" hidden>
            <div class="summary-box wide-card">
                <div class="panel-header compact">
                    <div>
                        <p class="panel-kicker">Import Excel / May cham cong</p>
                        <h3>Nap file log theo ngay va gio</h3>
                    </div>
                </div>
                <form class="stack-form" th:action="@{/timesheets/import}" method="post" enctype="multipart/form-data">
                    <div class="grid two-col">
                        <div>
                            <label class="field-label">Thang</label>
                            <input class="input" type="number" name="month" min="1" max="12" th:value="${month}" required>
                        </div>
                        <div>
                            <label class="field-label">Nam</label>
                            <input class="input" type="number" name="year" min="2020" max="2099" th:value="${year}" required>
                        </div>
                        <div>
                            <label class="field-label">Nguon du lieu</label>
                            <select class="input" name="source">
                                <option value="EXCEL_IMPORT" selected>Import Excel</option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">File .xlsx</label>
                            <input class="input" type="file" name="file" accept=".xlsx" required>
                        </div>
                    </div>
                    <div class="actions-row">
                        <button class="btn btn-primary" type="submit">Import file</button>
                    </div>
                </form>
            </div>
        </div>

        <table class="table">
            <thead><tr><th>Nhan vien</th><th>Phong ban</th><th>Ngay cong</th><th>Nghi phep</th><th>Gio thuong</th><th>GIO TANG CA</th><th>So log</th><th>Ghi chu</th><th>Thao tac</th></tr></thead>
            <tbody>
            <tr th:each="timesheet : ${timesheets}">
                <td>
                    <div th:text="${timesheet.employee.fullName}"></div>
                    <small class="muted-text" th:text="${timesheet.employee.employeeCode != null ? timesheet.employee.employeeCode : 'Chua co ma'}"></small>
                </td>
                <td th:text="${timesheet.employee.department != null ? timesheet.employee.department.name : 'Chua co phong'}"></td>
                <td th:text="${timesheet.workDays}"></td>
                <td th:text="${timesheet.leaveDays}"></td>
                <td th:text="|${timesheet.regularHours}h|"></td>
                <td th:text="|${timesheet.overtimeWeekdayHours + timesheet.overtimeWeekendHours + timesheet.overtimeHolidayHours}h|"></td>
                <td th:text="${timesheet.importedLogCount}"></td>
                <td th:text="${timesheet.note != null and !timesheet.note.isBlank() ? timesheet.note : 'Khong co'}"></td>
                <td class="actions">
                    <a class="btn btn-outline btn-sm" th:href="@{/timesheets/{id}/details(id=${timesheet.id},month=${month},year=${year})}">Chi tiet</a>
                    <form th:action="@{/timesheets/{id}/delete(id=${timesheet.id})}" method="post"><input type="hidden" name="month" th:value="${month}"><input type="hidden" name="year" th:value="${year}"><button class="btn btn-danger btn-sm" type="submit">Xoa</button></form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(timesheets)}"><td colspan="9" class="empty-cell">Chua co du lieu cham cong. Ban co the import file log Excel.</td></tr>
            </tbody>
        </table>
    </section>
    <script>
        (() => {
            const toggleButton = document.getElementById("toggleImportFormBtn");
            const importFormWrapper = document.getElementById("importFormWrapper");
            if (!toggleButton || !importFormWrapper) {
                return;
            }
            toggleButton.addEventListener("click", () => {
                const willShow = importFormWrapper.hasAttribute("hidden");
                importFormWrapper.toggleAttribute("hidden");
                toggleButton.setAttribute("aria-expanded", String(willShow));
                toggleButton.textContent = willShow ? "An form import" : "Import bang cong Excel";
            });
        })();
    </script>
</div>
