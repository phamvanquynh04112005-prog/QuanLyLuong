<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Bao cao chi phi luong</p>
                <h3>Thoi gian va trong so theo phong ban</h3>
            </div>
        </div>

        <form class="toolbar" method="get" th:action="@{/reports/department}">
            <input class="input" style="max-width: 120px" type="number" min="1" max="12" name="month" th:value="${month}">
            <input class="input" style="max-width: 120px" type="number" min="2020" max="2099" name="year" th:value="${year}">
            <button class="btn btn-primary" type="submit">Xem bao cao</button>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>Phong ban</th>
                <th>Tong chi luong</th>
                <th>Ti le</th>
                <th>Phan bo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${reportItems}">
                <td th:text="${item.departmentName}"></td>
                <td th:text="${#numbers.formatDecimal(item.totalSalary, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                <td th:text="${item.percentage} + '%' "></td>
                <td>
                    <div class="progress-track">
                        <div class="progress-bar" th:style="'width:' + ${item.percentage} + '%' "></div>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(reportItems)}">
                <td colspan="4" class="empty-cell">Chua co du lieu bang luong de lap bao cao.</td>
            </tr>
            </tbody>
        </table>

        <div class="summary-box" th:if="${not #lists.isEmpty(reportItems)}">
            <div class="stat-label">Tong chi luong toan doanh nghiep</div>
            <div class="stat-value" th:text="${#numbers.formatDecimal(overallTotal, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
        </div>
    </section>
</div>
