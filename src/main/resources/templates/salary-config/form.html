<div th:fragment="content">
    <section class="panel form-panel">
        <div class="panel-header compact">
            <div>
                <p class="panel-kicker">Cấu hình lương</p>
                <h3>Thiết lập ngày công chuẩn, hệ số OT, bảo hiểm và thuế</h3>
            </div>
            <a class="btn btn-outline" th:href="@{/salary-configs}">Quay lại</a>
        </div>
        <form class="stack-form" th:action="@{/salary-configs/save}" method="post">
            <div class="grid two-col">
                <div>
                    <label class="field-label">Nh&#226;n vi&#234;n</label>
                    <select class="input" name="employeeId" required>
                        <option value="">Ch&#7885;n nh&#226;n vi&#234;n</option>
                        <option th:each="employee : ${employees}" th:value="${employee.id}" th:selected="${selectedEmployeeId != null and selectedEmployeeId == employee.id}" th:text="|${employee.fullName} - ${employee.department != null ? employee.department.name : 'Chưa có phòng'}|"></option>
                    </select>
                </div>
                <div>
                    <label class="field-label">Ngày áp dụng</label>
                    <input class="input" type="date" name="effectiveDate" th:value="${defaultDate}">
                </div>
                <div>
                    <label class="field-label">Phụ cấp cố định</label>
                    <input class="input" type="number" step="1000" min="0" name="allowance" value="0">
                </div>
                <div>
                    <label class="field-label">Khấu trừ cố định</label>
                    <input class="input" type="number" step="1000" min="0" name="deduction" value="0">
                </div>
                <div>
                    <label class="field-label">Ngày công chuẩn</label>
                    <input class="input" type="number" name="standardWorkDays" min="1" max="31" value="26">
                </div>
                <div>
                    <label class="field-label">Giờ làm việc / ngày</label>
                    <input class="input" type="number" name="standardWorkHoursPerDay" min="1" max="24" step="0.5" value="8">
                </div>
                <div>
                    <label class="field-label">Hệ số OT ngày thường</label>
                    <input class="input" type="number" name="overtimeWeekdayMultiplier" min="1" step="0.1" value="1.5">
                </div>
                <div>
                    <label class="field-label">Hệ số OT cuối tuần</label>
                    <input class="input" type="number" name="overtimeWeekendMultiplier" min="1" step="0.1" value="2.0">
                </div>
                <div>
                    <label class="field-label">Hệ số OT ngày lễ</label>
                    <input class="input" type="number" name="overtimeHolidayMultiplier" min="1" step="0.1" value="3.0">
                </div>
                <div>
                    <label class="field-label">Giảm trừ bản thân</label>
                    <input class="input" type="number" name="personalDeduction" min="0" step="1000" value="11000000">
                </div>
                <div>
                    <label class="field-label">Giảm trừ / người phụ thuộc</label>
                    <input class="input" type="number" name="dependentDeductionPerPerson" min="0" step="1000" value="4400000">
                </div>
                <div>
                    <label class="field-label">Tỷ lệ BHXH</label>
                    <input class="input" type="number" name="socialInsuranceRate" min="0" step="0.001" value="0.08">
                </div>
                <div>
                    <label class="field-label">Tỷ lệ BHYT</label>
                    <input class="input" type="number" name="healthInsuranceRate" min="0" step="0.001" value="0.015">
                </div>
                <div>
                    <label class="field-label">Tỷ lệ BHTN</label>
                    <input class="input" type="number" name="unemploymentInsuranceRate" min="0" step="0.001" value="0.01">
                </div>
            </div>
            <div class="summary-box helper-card">
                Hệ thống sẽ tự động áp dụng biểu thuế TNCN lũy tiến theo tháng. Mức giảm trừ người phụ thuộc sẽ nhân với số người phụ thuộc trong hồ sơ nhân viên.
            </div>
            <div>
                <label class="field-label">Mô tả</label>
                <textarea class="input" name="description" rows="4" placeholder="Ví dụ: áp dụng biểu thuế lũy tiến, giảm trừ người phụ thuộc 4.4 triệu/người..."></textarea>
            </div>
            <div class="actions-row"><button class="btn btn-primary" type="submit">Lưu cấu hình</button><a class="btn btn-secondary" th:href="@{/salary-configs}">Hủy</a></div>
        </form>
    </section>
</div>
