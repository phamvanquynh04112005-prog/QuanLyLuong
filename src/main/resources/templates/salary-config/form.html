<div th:fragment="content">
    <section class="panel form-panel">
        <div class="panel-header compact">
            <div>
                <p class="panel-kicker">Bang rule tinh luong</p>
                <h3>Thiet lap cong chuan, he so OT, bao hiem va thue TNCN luy tien</h3>
            </div>
            <a class="btn btn-outline" th:href="@{/salary-configs}">Quay lai</a>
        </div>
        <form class="stack-form" th:action="@{/salary-configs/save}" method="post">
            <div class="grid two-col">
                <div>
                    <label class="field-label">Nhan vien</label>
                    <select class="input" name="employeeId" required>
                        <option value="">Chon nhan vien</option>
                        <option th:each="employee : ${employees}" th:value="${employee.id}" th:selected="${selectedEmployeeId != null and selectedEmployeeId == employee.id}" th:text="|${employee.fullName} - ${employee.department != null ? employee.department.name : 'Chua co phong'}|"></option>
                    </select>
                </div>
                <div>
                    <label class="field-label">Ngay ap dung</label>
                    <input class="input" type="date" name="effectiveDate" th:value="${defaultDate}">
                </div>
                <div>
                    <label class="field-label">Phu cap co dinh</label>
                    <input class="input" type="number" step="1000" min="0" name="allowance" value="0">
                </div>
                <div>
                    <label class="field-label">Khau tru co dinh</label>
                    <input class="input" type="number" step="1000" min="0" name="deduction" value="0">
                </div>
                <div>
                    <label class="field-label">Ngay cong chuan</label>
                    <input class="input" type="number" name="standardWorkDays" min="1" max="31" value="26">
                </div>
                <div>
                    <label class="field-label">Gio lam viec / ngay</label>
                    <input class="input" type="number" name="standardWorkHoursPerDay" min="1" max="24" step="0.5" value="8">
                </div>
                <div>
                    <label class="field-label">He so OT ngay thuong</label>
                    <input class="input" type="number" name="overtimeWeekdayMultiplier" min="1" step="0.1" value="1.5">
                </div>
                <div>
                    <label class="field-label">He so OT cuoi tuan</label>
                    <input class="input" type="number" name="overtimeWeekendMultiplier" min="1" step="0.1" value="2.0">
                </div>
                <div>
                    <label class="field-label">He so OT ngay le</label>
                    <input class="input" type="number" name="overtimeHolidayMultiplier" min="1" step="0.1" value="3.0">
                </div>
                <div>
                    <label class="field-label">Giam tru ban than</label>
                    <input class="input" type="number" name="personalDeduction" min="0" step="1000" value="11000000">
                </div>
                <div>
                    <label class="field-label">Giam tru / nguoi phu thuoc</label>
                    <input class="input" type="number" name="dependentDeductionPerPerson" min="0" step="1000" value="4400000">
                </div>
                <div>
                    <label class="field-label">Ty le BHXH</label>
                    <input class="input" type="number" name="socialInsuranceRate" min="0" step="0.001" value="0.08">
                </div>
                <div>
                    <label class="field-label">Ty le BHYT</label>
                    <input class="input" type="number" name="healthInsuranceRate" min="0" step="0.001" value="0.015">
                </div>
                <div>
                    <label class="field-label">Ty le BHTN</label>
                    <input class="input" type="number" name="unemploymentInsuranceRate" min="0" step="0.001" value="0.01">
                </div>
            </div>
            <div class="summary-box helper-card">
                He thong se tu dong ap bieu thue TNCN luy tien 7 bac theo thang cua Viet Nam. Muc giam tru nguoi phu thuoc se nhan voi so NPT dang luu trong ho so nhan vien.
            </div>
            <div>
                <label class="field-label">Mo ta</label>
                <textarea class="input" name="description" rows="4" placeholder="Vi du: ap dung bieu thue luy tien, giam tru NPT 4.4 trieu/nguoI..."></textarea>
            </div>
            <div class="actions-row"><button class="btn btn-primary" type="submit">Luu cau hinh</button><a class="btn btn-secondary" th:href="@{/salary-configs}">Huy</a></div>
        </form>
    </section>
</div>
