<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">C&#7845;u h&#236;nh l&#432;&#417;ng</p>
                <h3>C&#7845;u h&#236;nh c&#7889; &#273;&#7883;nh theo nh&#226;n vi&#234;n cho c&#244;ng chu&#7849;n, OT, b&#7843;o hi&#7875;m v&#224; thu&#7871;</h3>
            </div>
            <a class="btn btn-primary" th:href="@{/salary-configs/new}">Th&#234;m c&#7845;u h&#236;nh</a>
        </div>

        <form class="toolbar" method="get" th:action="@{/salary-configs}">
            <input class="input" style="min-width: 320px; max-width: 520px"
                   type="text" name="keyword" th:value="${keyword}"
                   placeholder="Nh&#7853;p t&#234;n nh&#226;n vi&#234;n ho&#7863;c m&#227; nh&#226;n vi&#234;n...">
            <button class="btn btn-outline" type="submit">T&#236;m ki&#7871;m</button>
            <a class="btn btn-secondary" th:if="${historyView}" th:href="@{/salary-configs}">V&#7873; danh s&#225;ch t&#7893;ng</a>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>M&#227; nh&#226;n vi&#234;n</th>
                <th>T&#234;n nh&#226;n vi&#234;n</th>
                <th>C&#7889; &#273;&#7883;nh</th>
                <th>C&#244;ng chu&#7849;n</th>
                <th>H&#7879; s&#7889; OT</th>
                <th>B&#7843;o hi&#7875;m</th>
                <th>Thu&#7871;</th>
                <th>Ng&#224;y &#225;p d&#7909;ng</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="config : ${salaryConfigs}">
                <td th:text="${config.employee.employeeCode != null and !config.employee.employeeCode.isBlank() ? config.employee.employeeCode : 'Ch&#432;a c&#7845;p'}"></td>
                <td>
                    <div th:text="${config.employee.fullName}"></div>
                    <small class="muted-text" th:text="${config.employee.department != null ? config.employee.department.name : 'Ch&#432;a c&#243; ph&#242;ng'}"></small>
                </td>
                <td>
                    <div th:text="|Ph&#7909; c&#7845;p: ${#numbers.formatDecimal(config.allowance, 0, 'COMMA', 0, 'POINT')} VND|"></div>
                    <small class="muted-text" th:text="|Kh&#7845;u tr&#7915;: ${#numbers.formatDecimal(config.deduction, 0, 'COMMA', 0, 'POINT')} VND|"></small>
                </td>
                <td th:text="|${config.standardWorkDays} ng&#224;y / ${config.standardWorkHoursPerDay} gi&#7901;|"></td>
                <td th:text="|${config.overtimeWeekdayMultiplier} / ${config.overtimeWeekendMultiplier} / ${config.overtimeHolidayMultiplier}|"></td>
                <td th:text="|BHXH ${config.socialInsuranceRate}, BHYT ${config.healthInsuranceRate}, BHTN ${config.unemploymentInsuranceRate}|"></td>
                <td>
                    <div th:text="|TNCN ${config.personalIncomeTaxRate}|"></div>
                    <small class="muted-text" th:text="|Gi&#7843;m tr&#7915; ${#numbers.formatDecimal(config.personalDeduction, 0, 'COMMA', 0, 'POINT')} VND|"></small>
                </td>
                <td>
                    <div th:text="${config.effectiveDate}"></div>
                    <small class="muted-text" th:text="${config.description != null and !config.description.isBlank() ? config.description : 'Kh&#244;ng c&#243; m&#244; t&#7843;'}"></small>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(salaryConfigs)}">
                <td colspan="8" class="empty-cell">Ch&#432;a c&#243; c&#7845;u h&#236;nh l&#432;&#417;ng n&#224;o.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
