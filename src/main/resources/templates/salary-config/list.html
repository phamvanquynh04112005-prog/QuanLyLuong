<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Rule tinh luong</p>
                <h3>Cau hinh co dinh theo nhan vien cho cong chuan, OT, bao hiem va thue</h3>
            </div>
            <a class="btn btn-primary" th:href="@{/salary-configs/new}">Them cau hinh</a>
        </div>

        <form class="toolbar" method="get" th:action="@{/salary-configs}">
            <select class="input" name="employeeId">
                <option value="">Xem cau hinh moi nhat cua tat ca</option>
                <option th:each="employee : ${employees}" th:value="${employee.id}" th:selected="${selectedEmployeeId != null and selectedEmployeeId == employee.id}" th:text="${employee.fullName}"></option>
            </select>
            <button class="btn btn-outline" type="submit">Loc du lieu</button>
            <a class="btn btn-secondary" th:if="${historyView}" th:href="@{/salary-configs}">Ve danh sach tong</a>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>Nhan vien</th>
                <th>Co dinh</th>
                <th>Cong chuan</th>
                <th>He so OT</th>
                <th>Bao hiem</th>
                <th>Thue</th>
                <th>Ngay ap dung</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="config : ${salaryConfigs}">
                <td>
                    <div th:text="${config.employee.fullName}"></div>
                    <small class="muted-text" th:text="${config.employee.department != null ? config.employee.department.name : 'Chua co phong'}"></small>
                </td>
                <td>
                    <div th:text="|Phu cap: ${#numbers.formatDecimal(config.allowance, 0, 'COMMA', 0, 'POINT')} VND|"></div>
                    <small class="muted-text" th:text="|Khau tru: ${#numbers.formatDecimal(config.deduction, 0, 'COMMA', 0, 'POINT')} VND|"></small>
                </td>
                <td th:text="|${config.standardWorkDays} ngay / ${config.standardWorkHoursPerDay} gio|"></td>
                <td th:text="|${config.overtimeWeekdayMultiplier} / ${config.overtimeWeekendMultiplier} / ${config.overtimeHolidayMultiplier}|"></td>
                <td th:text="|BHXH ${config.socialInsuranceRate}, BHYT ${config.healthInsuranceRate}, BHTN ${config.unemploymentInsuranceRate}|"></td>
                <td>
                    <div th:text="|TNCN ${config.personalIncomeTaxRate}|"></div>
                    <small class="muted-text" th:text="|Giam tru ${#numbers.formatDecimal(config.personalDeduction, 0, 'COMMA', 0, 'POINT')} VND|"></small>
                </td>
                <td>
                    <div th:text="${config.effectiveDate}"></div>
                    <small class="muted-text" th:text="${config.description != null and !config.description.isBlank() ? config.description : 'Khong co mo ta'}"></small>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(salaryConfigs)}">
                <td colspan="7" class="empty-cell">Chua co cau hinh luong nao.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
