<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | Quản Lý Lương</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="auth-body">
<div class="auth-shell">
    <div class="auth-card">
        <p class="brand-kicker">Payroll Login</p>
        <h1>Quản Lý Lương</h1>
        <p class="auth-copy">&#272;&#259;ng nh&#7853;p &#273;&#7875; qu&#7843;n l&#253; nh&#226;n vi&#234;n, ch&#7845;m c&#244;ng, b&#7843;ng l&#432;&#417;ng v&#224; b&#225;o c&#225;o.</p>

        <div class="alert danger" th:if="${param.error}">Tên đăng nhập hoặc mật khẩu không đúng.</div>
        <div class="alert success" th:if="${param.logout}">Bạn đã đăng xuất thành công.</div>

        <form th:action="@{/login}" method="post" class="stack-form">
            <label class="field-label" for="username">Tên đăng nhập</label>
            <input class="input" id="username" name="username" type="text" required autofocus>

            <label class="field-label" for="password">Mật khẩu</label>
            <input class="input" id="password" name="password" type="password" required>

            <label class="checkbox-row">
                <input type="checkbox" name="remember-me">
                <span>Ghi nhớ đăng nhập trong 7 ngày</span>
            </label>

            <button class="btn btn-primary btn-block" type="submit">Đăng nhập</button>
        </form>

        <div class="login-hint">
            <strong>Tài khoản mẫu:</strong>
            <span>`admin / Admin@123`, `hr01 / Hr@123`, `kt01 / Kt@123`, `nv001 / Nv@123`</span>
        </div>
    </div>
</div>
</body>
</html>
