<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Phu cap, thuong, khau tru dong</p>
                <h3>Quan ly cac khoan tac dong truc tiep vao bang luong</h3>
            </div>
        </div>

        <form class="toolbar" method="get" th:action="@{/compensation-items}">
            <select class="input" name="employeeId">
                <option value="">Tat ca nhan vien</option>
                <option th:each="employee : ${employees}"
                        th:value="${employee.id}"
                        th:selected="${selectedEmployeeId != null and selectedEmployeeId == employee.id}"
                        th:text="|${employee.fullName} (${employee.employeeCode != null ? employee.employeeCode : 'NoCode'})|"></option>
            </select>
            <button class="btn btn-outline" type="submit">Loc du lieu</button>
        </form>

        <div class="detail-grid">
            <div class="summary-box wide-card">
                <div class="stat-label">Them cau phan moi</div>
                <form class="stack-form" th:action="@{/compensation-items/save}" method="post">
                    <div class="grid two-col">
                        <div>
                            <label class="field-label">Nhan vien</label>
                            <select class="input" name="employeeId" required>
                                <option value="">Chon nhan vien</option>
                                <option th:each="employee : ${employees}"
                                        th:value="${employee.id}"
                                        th:selected="${selectedEmployeeId != null and selectedEmployeeId == employee.id}"
                                        th:text="|${employee.fullName} - ${employee.department != null ? employee.department.name : 'Chua co phong'}|"></option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">Loai</label>
                            <select class="input" name="componentType" required>
                                <option th:each="type : ${types}" th:value="${type}" th:text="${type.label}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">Ten khoan</label>
                            <input class="input" type="text" name="name" required placeholder="Vi du: Thuong KPI, phu cap com trua">
                        </div>
                        <div>
                            <label class="field-label">So tien</label>
                            <input class="input" type="number" name="amount" min="0" step="1000" value="0" required>
                        </div>
                        <div>
                            <label class="field-label">Ngay bat dau</label>
                            <input class="input" type="date" name="effectiveDate" th:value="${defaultDate}">
                        </div>
                        <div>
                            <label class="field-label">Ngay ket thuc</label>
                            <input class="input" type="date" name="endDate">
                        </div>
                    </div>
                    <div class="checkbox-row">
                        <label><input type="checkbox" name="taxable" value="true"> Tinh vao thu nhap chiu thue</label>
                        <label><input type="checkbox" name="recurring" value="true" checked> Lap lai hang thang</label>
                        <label><input type="checkbox" name="active" value="true" checked> Dang hoat dong</label>
                    </div>
                    <div>
                        <label class="field-label">Ghi chu</label>
                        <textarea class="input" rows="3" name="note" placeholder="Thong tin bo sung ve khoan muc"></textarea>
                    </div>
                    <div class="actions-row">
                        <button class="btn btn-primary" type="submit">Luu cau phan</button>
                    </div>
                </form>
            </div>

            <div class="panel nested-panel">
                <div class="panel-header compact">
                    <div>
                        <p class="panel-kicker">Danh sach hien co</p>
                        <h3 th:text="${selectedEmployeeId != null ? 'Theo nhan vien da chon' : 'Tat ca cau phan dong'}"></h3>
                    </div>
                </div>
                <table class="table">
                    <thead>
                    <tr>
                        <th>Nhan vien</th>
                        <th>Loai</th>
                        <th>Ten khoan</th>
                        <th>So tien</th>
                        <th>Thue</th>
                        <th>Lap lai</th>
                        <th>Hieu luc</th>
                        <th>Thao tac</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${items}">
                        <td th:text="${item.employee.fullName}"></td>
                        <td th:text="${item.componentType.label}"></td>
                        <td>
                            <div th:text="${item.name}"></div>
                            <small class="muted-text" th:text="${item.note != null and !item.note.isBlank() ? item.note : 'Khong co ghi chu'}"></small>
                        </td>
                        <td th:text="|${#numbers.formatDecimal(item.amount, 0, 'COMMA', 0, 'POINT')} VND|"></td>
                        <td th:text="${item.taxable ? 'Co' : 'Khong'}"></td>
                        <td th:text="${item.recurring ? 'Hang thang' : 'Mot lan'}"></td>
                        <td th:text="|${item.effectiveDate} ${item.endDate != null ? '-> ' + item.endDate : ''}|"></td>
                        <td class="actions">
                            <form th:action="@{/compensation-items/{id}/delete(id=${item.id})}" method="post">
                                <input type="hidden" name="employeeId" th:value="${selectedEmployeeId}">
                                <button class="btn btn-danger btn-sm" type="submit">Xoa</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(items)}">
                        <td colspan="8" class="empty-cell">Chua co cau phan dong nao. Hay tao phu cap, thuong hoac khau tru de payroll tinh them.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</div>
