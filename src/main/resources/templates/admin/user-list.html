<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Quan tri truy cap</p>
                <h3>Danh sach tai khoan dang nhap</h3>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/users/new}">Them tai khoan</a>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>Nhan vien lien ket</th>
                <th>Trang thai</th>
                <th>Thao tac</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.username}"></td>
                <td th:text="${user.role.label}"></td>
                <td th:text="${user.employee != null ? user.employee.fullName : 'Khong lien ket'}"></td>
                <td>
                    <span class="badge" th:classappend="${user.enabled} ? ' badge-success' : ' badge-muted'" th:text="${user.enabled ? 'Dang hoat dong' : 'Da khoa'}"></span>
                </td>
                <td class="actions">
                    <a class="btn btn-secondary btn-sm" th:href="@{/admin/users/edit/{id}(id=${user.id})}">Sua</a>
                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                        <button class="btn btn-danger btn-sm" type="submit">Xoa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
