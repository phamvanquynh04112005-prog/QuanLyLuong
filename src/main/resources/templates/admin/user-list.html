<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Quản trị truy cập</p>
                <h3>Danh s&#225;ch t&#224;i kho&#7843;n &#273;&#259;ng nh&#7853;p</h3>
            </div>
            <a class="btn btn-primary" th:href="@{/admin/users/new}">Thêm tài khoản</a>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Username</th>
                <th>Role</th>
                <th>M&#227; nh&#226;n vi&#234;n</th>
                <th>Nh&#226;n vi&#234;n li&#234;n k&#7871;t</th>
                <th>Trạng thái</th>
                <th>Thao tac</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.username}"></td>
                <td th:text="${user.role.label}"></td>
                <td th:text="${user.employee != null and user.employee.employeeCode != null ? user.employee.employeeCode : '--'}"></td>
                <td th:text="${user.employee != null ? user.employee.fullName : 'Không liên kết'}"></td>
                <td>
                    <span class="badge" th:classappend="${user.enabled} ? ' badge-success' : ' badge-muted'" th:text="${user.enabled ? 'Đang hoạt động' : 'Đã khóa'}"></span>
                </td>
                <td class="actions">
                    <a class="btn btn-secondary btn-sm" th:href="@{/admin/users/edit/{id}(id=${user.id})}">Sửa</a>
                    <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                        <button class="btn btn-danger btn-sm" type="submit">Xóa</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
