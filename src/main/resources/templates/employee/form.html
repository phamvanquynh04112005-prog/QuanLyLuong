<div th:fragment="content">
    <section class="panel form-panel">
        <div class="panel-header compact">
            <div>
                <p class="panel-kicker">Hồ sơ nhân viên</p>
                <h3 th:text="${employee.id == null ? 'Thêm nhân viên mới' : 'Cập nhật nhân viên'}"></h3>
            </div>
            <div class="actions-row">
                <a class="btn btn-secondary" th:if="${employee.id == null}" th:href="@{/employees/import}">Import Excel</a>
                <a class="btn btn-outline" th:href="@{/employees}">Quay lại</a>
            </div>
        </div>

        <form class="stack-form" th:action="@{/employees/save}" th:object="${employee}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="grid two-col">
                <div>
                    <label class="field-label">Mã nhân viên</label>
                    <input class="input" type="text" th:field="*{employeeCode}" placeholder="Ví dụ: EMP0101">
                </div>
                <div>
                    <label class="field-label">Họ và tên</label>
                    <input class="input" type="text" th:field="*{fullName}" required>
                </div>
                <div>
                    <label class="field-label">Email</label>
                    <input class="input" type="email" th:field="*{email}" required>
                </div>
                <div>
                    <label class="field-label">Chức vụ</label>
                    <input class="input" type="text" th:field="*{position}">
                </div>
                <div>
                    <label class="field-label">Phòng ban</label>
                    <select class="input" th:field="*{department.id}">
                        <option value="">Chọn phòng ban</option>
                        <option th:each="department : ${departments}" th:value="${department.id}" th:text="${department.name}"></option>
                    </select>
                </div>
                <div>
                    <label class="field-label">Lương cơ bản</label>
                    <input class="input" type="number" min="0" step="1000" th:field="*{baseSalary}">
                </div>
                <div>
                    <label class="field-label">Ngày vào làm</label>
                    <input class="input" type="date" th:field="*{joinDate}">
                </div>
                <div>
                    <label class="field-label">Số người phụ thuộc</label>
                    <input class="input" type="number" min="0" step="1" th:field="*{dependentCount}">
                </div>
                <div>
                    <label class="field-label">Trạng thái</label>
                    <select class="input" th:field="*{status}">
                        <option th:each="status : ${statuses}" th:value="${status}" th:text="${status.label}"></option>
                    </select>
                </div>
            </div>

            <div class="actions-row">
                <button class="btn btn-primary" type="submit">Lưu thông tin</button>
                <a class="btn btn-secondary" th:href="@{/employees}">Hủy</a>
            </div>
        </form>
    </section>
</div>
