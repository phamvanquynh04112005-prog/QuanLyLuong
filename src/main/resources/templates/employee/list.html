<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Danh s&#225;ch nh&#226;n vi&#234;n</p>
                <h3>Th&#234;m, c&#7853;p nh&#7853;t v&#224; tra c&#7913;u h&#7891; s&#417; nh&#226;n s&#7921;</h3>
            </div>
            <div class="actions-row">
                <a class="btn btn-primary" th:href="@{/employees/new}">Thêm thủ công</a>
                <a class="btn btn-secondary" th:href="@{/employees/import}">Import Excel</a>
            </div>
        </div>

        <form class="toolbar" method="get" th:action="@{/employees}">
            <input class="input" style="min-width: 320px; max-width: 520px" type="text" name="keyword"
                   placeholder="T&#236;m theo m&#227; nh&#226;n vi&#234;n ho&#7863;c h&#7885; t&#234;n..." th:value="${keyword}">
            <button class="btn btn-outline" type="submit">T&#236;m ki&#7871;m</button>
        </form>

        <table class="table">
            <thead>
            <tr>
                <th>M&#227; NV</th>
                <th>H&#7885; t&#234;n</th>
                <th>Email</th>
                <th>Ch&#7913;c v&#7909;</th>
                <th>Ph&#242;ng ban</th>
                <th>L&#432;&#417;ng c&#417; b&#7843;n</th>
                <th>Tr&#7841;ng th&#225;i</th>
                <th>Thao t&#225;c</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="employee : ${employees}">
                <td th:text="${employee.employeeCode != null ? employee.employeeCode : 'Ch&#432;a c&#7845;p'}"></td>
                <td>
                    <div th:text="${employee.fullName}"></div>
                    <small class="muted-text" th:text="|NPT: ${employee.dependentCount != null ? employee.dependentCount : 0}|"></small>
                </td>
                <td th:text="${employee.email}"></td>
                <td th:text="${employee.position}"></td>
                <td th:text="${employee.department != null ? employee.department.name : 'Ch&#432;a c&#243; ph&#242;ng'}"></td>
                <td th:text="|${#numbers.formatDecimal(employee.baseSalary, 0, 'COMMA', 0, 'POINT')} VND|"></td>
                <td>
                    <span class="badge"
                          th:classappend="${employee.status.name() == 'ACTIVE'} ? ' badge-success' : ' badge-muted'"
                          th:text="${employee.status.label}"></span>
                </td>
                <td class="employee-action-cell">
                    <div class="employee-action-wrap">
                        <a class="btn btn-secondary btn-sm" th:href="@{/employees/edit/{id}(id=${employee.id})}">S&#7917;a</a>
                        <form th:action="@{/employees/{id}/delete(id=${employee.id})}" method="post">
                            <button class="btn btn-danger btn-sm" type="submit">X&#243;a</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="8" class="empty-cell">Ch&#432;a c&#243; nh&#226;n vi&#234;n n&#224;o.</td>
            </tr>
            </tbody>
        </table>
    </section>
</div>
