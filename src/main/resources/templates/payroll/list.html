<div th:fragment="content">
    <section class="panel">
        <div class="panel-header">
            <div>
                <p class="panel-kicker">Tính lương theo tháng</p>
                <h3 th:text="|Bảng lương tháng ${month}/${year}|"></h3>
            </div>
            <div class="actions-row">
                <a class="btn btn-outline" th:href="@{/payrolls/search(month=${month},year=${year})}">Tra cứu nâng cao</a>
                <a class="btn btn-secondary" th:href="@{/export/excel/payroll(month=${month},year=${year})}">Xuat Excel</a>
                <a class="btn btn-secondary" th:href="@{/export/pdf/payroll(month=${month},year=${year})}">Xuat PDF</a>
            </div>
        </div>

        <div class="payroll-action-row">
            <form class="payroll-filter-form" method="get" th:action="@{/payrolls}">
                <input class="input" style="max-width: 120px" type="number" min="1" max="12" name="month" th:value="${month}">
                <input class="input" style="max-width: 120px" type="number" min="2020" max="2099" name="year" th:value="${year}">
                <button class="btn btn-outline" type="submit">Lọc</button>
            </form>
            <form class="payroll-calc-form" th:action="@{/payrolls/calculate}" method="post">
                <input type="hidden" name="month" th:value="${month}">
                <input type="hidden" name="year" th:value="${year}">
                <button class="btn btn-primary" type="submit">Tính lương hàng loạt</button>
            </form>
        </div>

        <table class="table">
            <thead>
            <tr><th>M&#227; NV</th><th>Nh&#226;n vi&#234;n</th><th>C&#244;ng / Gi&#7901;</th><th>L&#432;&#417;ng c&#417; b&#7843;n t&#237;nh</th><th>OT</th><th>Ph&#7909; c&#7845;p + Th&#432;&#7903;ng</th><th>BH + Thu&#7871; + Kh&#7845;u tr&#7915;</th><th>Th&#7921;c nh&#7853;n</th><th>Tr&#7841;ng th&#225;i</th></tr>
            </thead>
            <tbody>
            <tr th:each="payroll : ${payrolls}">
                <td th:text="${payroll.employee.employeeCode != null ? payroll.employee.employeeCode : 'Ch&#432;a c&#7845;p'}"></td>
                <td>
                    <div th:text="${payroll.employee.fullName}"></div>
                    <small class="muted-text" th:text="${payroll.employee.department != null ? payroll.employee.department.name : 'Chưa có phòng'}"></small>
                </td>
                <td>
                    <div th:text="|${payroll.timesheet != null ? payroll.timesheet.workDays : 0} công|"></div>
                    <small class="muted-text" th:text="|${payroll.timesheet != null ? payroll.timesheet.regularHours : 0}h / OT ${payroll.timesheet != null ? payroll.timesheet.overtimeWeekdayHours + payroll.timesheet.overtimeWeekendHours + payroll.timesheet.overtimeHolidayHours : 0}h|"></small>
                </td>
                <td th:text="|${#numbers.formatDecimal(payroll.baseSalaryAmount, 0, 'COMMA', 0, 'POINT')} VND|"></td>
                <td th:text="|${#numbers.formatDecimal(payroll.overtimePay, 0, 'COMMA', 0, 'POINT')} VND|"></td>
                <td>
                    <div th:text="|PC: ${#numbers.formatDecimal(payroll.totalAllowance, 0, 'COMMA', 0, 'POINT')} VND|"></div>
                    <small class="muted-text" th:text="|Thưởng: ${#numbers.formatDecimal(payroll.totalBonus, 0, 'COMMA', 0, 'POINT')} VND|"></small>
                </td>
                <td>
                    <div th:text="|BH: ${#numbers.formatDecimal(payroll.insuranceAmount, 0, 'COMMA', 0, 'POINT')} VND|"></div>
                    <small class="muted-text" th:text="|Thuế: ${#numbers.formatDecimal(payroll.taxAmount, 0, 'COMMA', 0, 'POINT')} - NPT: ${#numbers.formatDecimal(payroll.dependentDeductionAmount, 0, 'COMMA', 0, 'POINT')}|"></small>
                    <small class="muted-text" th:text="|Khấu trừ khác: ${#numbers.formatDecimal(payroll.otherDeductionAmount, 0, 'COMMA', 0, 'POINT')}|"></small>
                </td>
                <td>
                    <div th:text="|${#numbers.formatDecimal(payroll.actualSalary, 0, 'COMMA', 0, 'POINT')} VND|"></div>
                    <small class="muted-text" th:text="|Gross: ${#numbers.formatDecimal(payroll.grossSalary, 0, 'COMMA', 0, 'POINT')} VND|"></small>
                </td>
                <td><span class="badge" th:classappend="${payroll.paymentStatus.name() == 'PAID'} ? ' badge-success' : ' badge-warning'" th:text="${payroll.paymentStatus.label}"></span></td>
            </tr>
            <tr th:if="${#lists.isEmpty(payrolls)}"><td colspan="9" class="empty-cell">Chưa có bảng lương. Hãy nhập chấm công rồi bấm Tính lương hàng loạt.</td></tr>
            </tbody>
        </table>

        <div class="summary-box" th:if="${not #lists.isEmpty(payrolls)}">
            <div class="stat-label">Tổng chi lương thực nhận của tháng</div>
            <div class="stat-value" th:text="|${#numbers.formatDecimal(totalSalary, 0, 'COMMA', 0, 'POINT')} VND|"></div>
        </div>
    </section>
</div>
