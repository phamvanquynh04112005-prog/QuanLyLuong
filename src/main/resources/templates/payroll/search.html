<div th:fragment="content">
    <section class="panel">
        <form class="search-grid" method="get" th:action="@{/payrolls/search}">
            <div><label class="field-label">Th&#225;ng</label><input class="input" type="number" min="1" max="12" name="month" th:value="${criteria.month}"></div>
            <div><label class="field-label">Năm</label><input class="input" type="number" min="2020" max="2099" name="year" th:value="${criteria.year}"></div>
            <div>
                <label class="field-label">Phòng ban</label>
                <select class="input" name="departmentId">
                    <option value="">Tất cả phòng ban</option>
                    <option th:each="department : ${departments}" th:value="${department.id}" th:selected="${criteria.departmentId != null and criteria.departmentId == department.id}" th:text="${department.name}"></option>
                </select>
            </div>
            <div>
                <label class="field-label">Trạng thái chi lương</label>
                <select class="input" name="paymentStatus">
                    <option value="">Tất cả trạng thái</option>
                    <option th:each="status : ${paymentStatuses}" th:value="${status}" th:selected="${criteria.paymentStatus != null and criteria.paymentStatus == status}" th:text="${status.label}"></option>
                </select>
            </div>
            <div><label class="field-label">Tu khoa</label><input class="input" type="text" name="keyword" th:value="${criteria.keyword}" placeholder="Ten, email, chuc vu..."></div>
            <div><label class="field-label">Lương từ</label><input class="input" type="number" min="0" step="1000" name="minSalary" th:value="${criteria.minSalary}"></div>
            <div><label class="field-label">Lương đến</label><input class="input" type="number" min="0" step="1000" name="maxSalary" th:value="${criteria.maxSalary}"></div>
            <div class="search-actions payroll-search-actions"><button class="btn btn-primary" type="submit">Tìm payroll</button><a class="btn btn-secondary" th:href="@{/payrolls/search}">Đặt lại bộ lọc</a></div>
        </form>
    </section>

    <section class="stats-grid">
        <article class="stat-card"><div class="stat-label">So ket qua</div><div class="stat-value" th:text="${summary.resultCount}"></div></article>
        <article class="stat-card"><div class="stat-label">Tổng lương lọc được</div><div class="stat-value" th:text="|${#numbers.formatDecimal(summary.totalSalary, 0, 'COMMA', 0, 'POINT')} VND|"></div></article>
        <article class="stat-card"><div class="stat-label">Lương trung bình</div><div class="stat-value" th:text="|${#numbers.formatDecimal(summary.averageSalary, 0, 'COMMA', 0, 'POINT')} VND|"></div></article>
        <article class="stat-card"><div class="stat-label">Đã chi / Chưa chi</div><div class="stat-value" th:text="|${summary.paidCount} / ${summary.pendingCount}|"></div></article>
        <article class="stat-card"><div class="stat-label">Min / Max</div><div class="stat-value small-stack"><span th:text="|${#numbers.formatDecimal(summary.minSalary, 0, 'COMMA', 0, 'POINT')} VND|"></span><span th:text="|${#numbers.formatDecimal(summary.maxSalary, 0, 'COMMA', 0, 'POINT')} VND|"></span></div></article>
    </section>

    <section class="panel">
        <div class="panel-header compact"><div><p class="panel-kicker">K&#7871;t qu&#7843; chi ti&#7871;t</p><h3>Danh s&#225;ch payroll th&#7887;a &#273;i&#7873;u ki&#7879;n l&#7885;c</h3></div></div>
        <table class="table">
            <thead><tr><th>K&#7923;</th><th>M&#227; NV</th><th>Nh&#226;n vi&#234;n</th><th>Ph&#242;ng ban</th><th>Ch&#7913;c v&#7909;</th><th>Ng&#224;y c&#244;ng</th><th>L&#432;&#417;ng</th><th>Tr&#7841;ng th&#225;i</th><th>Ng&#224;y chi</th></tr></thead>
            <tbody>
            <tr th:each="payroll : ${payrolls}">
                <td th:text="|${payroll.month}/${payroll.year}|"></td>
                <td th:text="${payroll.employee.employeeCode != null ? payroll.employee.employeeCode : 'Chưa cấp'}"></td>
                <td><div class="cell-title" th:text="${payroll.employee.fullName}"></div><div class="cell-subtitle" th:text="${payroll.employee.email}"></div></td>
                <td th:text="${payroll.employee.department != null ? payroll.employee.department.name : 'Chưa có phòng'}"></td>
                <td th:text="${payroll.employee.position}"></td>
                <td th:text="${payroll.timesheet != null ? payroll.timesheet.workDays : 0}"></td>
                <td th:text="|${#numbers.formatDecimal(payroll.actualSalary, 0, 'COMMA', 0, 'POINT')} VND|"></td>
                <td><span class="badge" th:classappend="${payroll.paymentStatus.name() == 'PAID'} ? ' badge-success' : ' badge-warning'" th:text="${payroll.paymentStatus.label}"></span></td>
                <td th:text="${payroll.paymentDate != null ? payroll.paymentDate : '--'}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(payrolls)}"><td colspan="9" class="empty-cell">Không tìm thấy payroll nào phù hợp với bộ lọc hiện tại.</td></tr>
            </tbody>
        </table>
    </section>
</div>
